# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for the Internal PMS.
#   - Terminates SSL (Let's Encrypt certs).
#   - Serves the built React SPA (static files).
#   - Proxies /api      -> backend HTTP.
#   - Proxies /socket.io -> backend WebSocket (with the Upgrade headers that make
#     the WS handshake work — the single most common thing people get wrong).
#
# Place at /etc/nginx/sites-available/pms and symlink into sites-enabled.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream so we can add more backend instances later (Redis adapter keeps sockets coherent
# across them). For multiple instances, list them here; ip_hash gives sticky sessions which
# smooths the WS handshake (the adapter makes it correct either way).
upstream pms_backend {
    # ip_hash;            # enable when running >1 instance
    server 127.0.0.1:4000;
}

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name example.com;

    # Allow Let's Encrypt HTTP-01 challenge through before redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name example.com;

    # Certs issued by certbot (see deploy/DEPLOYMENT.md).
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---- Static SPA ----
    root /var/www/pms/frontend/dist;
    index index.html;

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- REST API ----
    location /api/ {
        proxy_pass http://pms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket (Socket.IO) ----
    # The Upgrade/Connection headers are mandatory — without them Nginx buffers the request
    # as plain HTTP and the socket silently falls back to long-polling (or fails).
    location /socket.io/ {
        proxy_pass http://pms_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # keep idle WS connections alive
    }
}
